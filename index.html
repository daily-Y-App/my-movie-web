<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Streaming</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600&display=swap');

        * { box-sizing: border-box; }
        body { background: #0a0a0a; font-family: 'Inter', sans-serif; }

        /* ── Header ── */
        .site-header {
            background: linear-gradient(to right, #0a0a0a, #111);
            border-bottom: 1px solid #222;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .site-header h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6rem;
            letter-spacing: 3px;
            color: #eab308;
        }
        .badge-hd {
            background: #eab308;
            color: #000;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 4px;
        }

        /* ── Player Section ── */
        #player-section {
            background: #000;
            border-bottom: 2px solid #1a1a1a;
        }
        /* iframe player */
        #drive-player-wrap {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 */
            background: #000;
        }
        #drive-player-wrap iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        /* native video (Plyr) */
        #native-player-wrap {
            max-width: 960px;
            margin: 0 auto;
        }
        .plyr--video { border-radius: 0; }
        .plyr__control--overlaid { background: #eab308 !important; }
        .plyr--full-ui input[type=range] { color: #eab308 !important; }

        #video-title-bar {
            padding: 10px 16px;
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
            background: #0f0f0f;
            border-top: 1px solid #1e1e1e;
        }
        #video-title-bar .type-badge {
            font-size: 10px;
            background: #eab308;
            color: #000;
            padding: 2px 6px;
            border-radius: 3px;
            margin-right: 8px;
            font-weight: 700;
        }

        /* ── Movie Grid ── */
        .section-title {
            font-size: 11px;
            letter-spacing: 3px;
            color: #555;
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        .movie-card {
            background: #111;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            border: 1px solid #1c1c1c;
        }
        .movie-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(234, 179, 8, 0.25);
            border-color: #eab308;
        }
        .movie-card:active { transform: scale(0.97); }

        .poster-wrap {
            position: relative;
            height: 170px;
            background: #1a1a1a;
            overflow: hidden;
        }
        .poster-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        .movie-card:hover .poster-wrap img { transform: scale(1.05); }

        .poster-wrap .play-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.4);
            opacity: 0;
            transition: opacity 0.2s;
        }
        .movie-card:hover .play-overlay { opacity: 1; }
        .play-icon {
            width: 44px; height: 44px;
            background: rgba(234,179,8,0.9);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        .poster-wrap .hd-badge {
            position: absolute;
            top: 6px; right: 6px;
            background: #eab308;
            color: #000;
            font-size: 9px;
            padding: 2px 5px;
            border-radius: 3px;
            font-weight: 700;
        }
        .poster-placeholder {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            color: #333;
            font-size: 11px;
            gap: 8px;
        }

        .movie-info {
            padding: 8px 10px;
        }
        .movie-info .title {
            font-size: 13px;
            font-weight: 600;
            color: #e5e5e5;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .movie-info .src-label {
            font-size: 10px;
            color: #555;
            margin-top: 2px;
        }

        /* ── Loading Skeleton ── */
        .skeleton {
            background: linear-gradient(90deg, #1a1a1a 25%, #222 50%, #1a1a1a 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
            border-radius: 8px;
        }
        @keyframes shimmer { to { background-position: -200% 0; } }

        /* ── Error / Empty ── */
        .msg-box {
            text-align: center;
            padding: 48px 16px;
            color: #444;
            grid-column: 1/-1;
        }
        .msg-box svg { margin: 0 auto 12px; }
    </style>
</head>
<body class="text-white">

    <!-- ── HEADER ── -->
    <div class="site-header">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="#eab308"><path d="M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4z"/></svg>
        <h1>Premium Streaming</h1>
        <span class="badge-hd">HD</span>
    </div>

    <!-- ── PLAYER SECTION (hidden by default) ── -->
    <div id="player-section" class="hidden">
        <!-- Google Drive iframe mode -->
        <div id="drive-player-wrap" class="hidden">
            <iframe id="drive-iframe" allowfullscreen allow="autoplay"></iframe>
        </div>
        <!-- Native video (Plyr) mode -->
        <div id="native-player-wrap" class="hidden">
            <video id="plyr-video" playsinline controls></video>
        </div>
        <div id="video-title-bar">
            <span class="type-badge" id="type-badge">DRIVE</span>
            <span id="video-title">Loading...</span>
        </div>
    </div>

    <!-- ── GRID ── -->
    <div class="container mx-auto p-4">
        <p class="section-title">Recommended For You</p>
        <div id="movie-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4">
            <!-- Skeleton placeholders while loading -->
            <div class="skeleton h-52 rounded-lg"></div>
            <div class="skeleton h-52 rounded-lg"></div>
            <div class="skeleton h-52 rounded-lg"></div>
            <div class="skeleton h-52 rounded-lg"></div>
        </div>
    </div>

    <!-- ── SCRIPTS ── -->
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs }
            from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        /* ────────────────────────────────────────────
           1. Firebase Config – change if needed
        ──────────────────────────────────────────── */
        const firebaseConfig = {
            apiKey: "AIzaSyD7T7WZg0fLGTw6ShqDHjOva-btNF6O1AM",
            authDomain: "seafood-oder.firebaseapp.com",
            databaseURL: "https://seafood-oder-default-rtdb.firebaseio.com",
            projectId: "seafood-oder",
            storageBucket: "seafood-oder.firebasestorage.app",
            messagingSenderId: "428949391732",
            appId: "1:428949391732:web:8c0ab80a98d241b865c421"
        };

        const app = initializeApp(firebaseConfig);
        const db  = getFirestore(app);

        /* ────────────────────────────────────────────
           2. Google Drive URL → embed URL converter
           Handles all common Drive URL formats:
             - /file/d/FILE_ID/view
             - /open?id=FILE_ID
             - /uc?id=FILE_ID&export=...
        ──────────────────────────────────────────── */
        function parseDriveId(url) {
            if (!url) return null;
            // /file/d/ID/...
            let m = url.match(/\/file\/d\/([a-zA-Z0-9_-]{10,})/);
            if (m) return m[1];
            // ?id=ID or &id=ID
            m = url.match(/[?&]id=([a-zA-Z0-9_-]{10,})/);
            if (m) return m[1];
            return null;
        }

        function getVideoInfo(rawUrl) {
            if (!rawUrl) return null;
            const url = rawUrl.trim();

            const driveId = parseDriveId(url);
            if (driveId) {
                return {
                    type: 'drive',
                    // /preview renders the Drive built-in player (no CORS issues)
                    src: `https://drive.google.com/file/d/${driveId}/preview`
                };
            }
            // Assume direct video URL (mp4, m3u8, etc.)
            return { type: 'direct', src: url };
        }

        /* ────────────────────────────────────────────
           3. Plyr instance (for direct videos only)
        ──────────────────────────────────────────── */
        const plyrPlayer = new Plyr('#plyr-video', {
            controls: ['play-large','play','progress','current-time','mute','volume','fullscreen'],
            ratio: '16:9'
        });

        /* ────────────────────────────────────────────
           4. Play a movie
        ──────────────────────────────────────────── */
        const playerSection   = document.getElementById('player-section');
        const driveWrap       = document.getElementById('drive-player-wrap');
        const driveIframe     = document.getElementById('drive-iframe');
        const nativeWrap      = document.getElementById('native-player-wrap');
        const videoTitleEl    = document.getElementById('video-title');
        const typeBadge       = document.getElementById('type-badge');

        function playMovie(title, rawUrl) {
            const info = getVideoInfo(rawUrl);

            if (!info) {
                alert('Video URL မရှိပါ။ Firebase မှာ url field စစ်ပါ။');
                return;
            }

            playerSection.classList.remove('hidden');
            videoTitleEl.textContent = title;

            if (info.type === 'drive') {
                // Show iframe, hide Plyr
                nativeWrap.classList.add('hidden');
                plyrPlayer.pause();
                driveIframe.src = info.src;
                driveWrap.classList.remove('hidden');
                typeBadge.textContent = 'DRIVE';
            } else {
                // Show Plyr, hide iframe
                driveWrap.classList.add('hidden');
                driveIframe.src = '';
                nativeWrap.classList.remove('hidden');
                plyrPlayer.source = {
                    type: 'video',
                    sources: [{ src: info.src, type: 'video/mp4' }]
                };
                plyrPlayer.play();
                typeBadge.textContent = 'MP4';
            }

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        /* ────────────────────────────────────────────
           5. Fetch movies from Firestore
           Trims spaces from all field names/values
        ──────────────────────────────────────────── */
        function extractField(data, ...keys) {
            for (const k of keys) {
                // try exact key, key with trailing space, lowercase
                for (const variant of [k, k + ' ', k.toLowerCase(), k.toLowerCase() + ' ']) {
                    if (data[variant] !== undefined && data[variant] !== '') {
                        return typeof data[variant] === 'string'
                            ? data[variant].trim()
                            : data[variant];
                    }
                }
            }
            return '';
        }

        async function fetchMovies() {
            const grid = document.getElementById('movie-grid');

            try {
                const snap = await getDocs(collection(db, 'movies'));

                if (snap.empty) {
                    grid.innerHTML = `
                        <div class="msg-box">
                            <svg width="40" height="40" fill="none" stroke="#444" stroke-width="1.5" viewBox="0 0 24 24">
                                <path stroke-linecap="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88"/>
                            </svg>
                            <p>Firestore "movies" collection မှာ data မတွေ့ပါ။</p>
                        </div>`;
                    return;
                }

                grid.innerHTML = '';

                snap.forEach(doc => {
                    const d = doc.data();

                    const title  = extractField(d, 'title',  'Title')  || 'Untitled';
                    const poster = extractField(d, 'poster', 'Poster') || '';
                    const url    = extractField(d, 'url',    'Url', 'URL') || '';

                    const info = getVideoInfo(url);
                    const srcLabel = info
                        ? (info.type === 'drive' ? '🔵 Google Drive' : '🟡 Direct MP4')
                        : '⚠️ No URL';

                    const card = document.createElement('div');
                    card.className = 'movie-card';
                    card.innerHTML = `
                        <div class="poster-wrap">
                            ${poster
                                ? `<img src="${poster}" alt="${title}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=poster-placeholder><svg width=32 height=32 fill=none stroke=#333 stroke-width=1.5 viewBox=\'0 0 24 24\'><rect x=2 y=2 width=20 height=20 rx=2.5/><path d=\'m10 8 6 4-6 4V8z\'/></svg><span>${title.substring(0,12)}</span></div>'">`
                                : `<div class="poster-placeholder">
                                    <svg width="32" height="32" fill="none" stroke="#333" stroke-width="1.5" viewBox="0 0 24 24">
                                        <rect x="2" y="2" width="20" height="20" rx="2.5"/>
                                        <path d="m10 8 6 4-6 4V8z"/>
                                    </svg>
                                    <span>${title.substring(0,12)}</span>
                                  </div>`
                            }
                            <div class="play-overlay">
                                <div class="play-icon">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="#000"><path d="M8 5v14l11-7z"/></svg>
                                </div>
                            </div>
                            <span class="hd-badge">HD</span>
                        </div>
                        <div class="movie-info">
                            <div class="title">${title}</div>
                            <div class="src-label">${srcLabel}</div>
                        </div>`;

                    card.addEventListener('click', () => playMovie(title, url));
                    grid.appendChild(card);
                });

            } catch (err) {
                console.error('Firebase error:', err);
                grid.innerHTML = `
                    <div class="msg-box">
                        <p style="color:#e74c3c">Firebase Error: ${err.message}</p>
                        <p style="font-size:12px;margin-top:8px;color:#555">Console စစ်ပါ (F12)</p>
                    </div>`;
            }
        }

        fetchMovies();
    </script>
</body>
</html>
