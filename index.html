<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HD Movie Stream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        .movie-card:hover { transform: scale(1.05); transition: 0.3s; }
        .active-card { border: 2px solid #eab308; }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans mb-10">

    <header class="p-5 bg-gray-800 shadow-2xl sticky top-0 z-50 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-yellow-500 tracking-wider">HD MOVIE STORE</h1>
    </header>

    <div id="player-container" class="hidden max-w-5xl mx-auto mt-5 p-2 bg-black rounded-lg shadow-2xl">
        <video id="player" playsinline controls crossorigin></video>
        <div class="p-4 bg-gray-800 rounded-b-lg">
            <h2 id="now-playing" class="text-xl font-semibold text-yellow-400"></h2>
            <p class="text-gray-400 text-sm mt-1">High Definition Streaming</p>
        </div>
    </div>

    <div class="container mx-auto p-5">
        <div class="flex items-center mb-6">
            <div class="h-8 w-1 bg-yellow-500 mr-3"></div>
            <h3 class="text-xl font-bold">Recommended Movies</h3>
        </div>
        
        <div id="loading" class="text-center py-10">
            <div class="inline-block h-8 w-8 animate-spin rounded-full border-4 border-solid border-yellow-500 border-r-transparent"></div>
            <p class="mt-2 text-gray-400">Loading movies...</p>
        </div>

        <div id="movie-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6">
            </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Your Firebase Configuration
        const firebaseConfig = {
          apiKey: "AIzaSyD7T7WZg0fLGTw6ShqDHjOva-btNF6O1AM",
          authDomain: "seafood-oder.firebaseapp.com",
          databaseURL: "https://seafood-oder-default-rtdb.firebaseio.com",
          projectId: "seafood-oder",
          storageBucket: "seafood-oder.firebasestorage.app",
          messagingSenderId: "428949391732",
          appId: "1:428949391732:web:8c0ab80a98d241b865c421",
          measurementId: "G-2E56Q73M1E"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        // Initialize Plyr Video Player
        const player = new Plyr('#player', {
            quality: { default: 720, options: [4320, 2880, 2160, 1440, 1080, 720, 576, 480, 360, 240] }
        });

        // Function to Fetch Movies from Firestore
        async function loadMovies() {
            try {
                const querySnapshot = await getDocs(collection(db, "movies"));
                const grid = document.getElementById('movie-grid');
                const loading = document.getElementById('loading');
                
                loading.classList.add('hidden');
                
                querySnapshot.forEach((doc) => {
                    const movie = doc.data();
                    const card = document.createElement('div');
                    card.className = "movie-card bg-gray-800 rounded-xl overflow-hidden cursor-pointer shadow-lg border border-gray-700 hover:border-yellow-500 transition-all";
                    card.innerHTML = `
                        <div class="relative overflow-hidden h-64">
                            <img src="${movie.poster}" class="w-full h-full object-cover">
                            <div class="absolute bottom-2 right-2 bg-yellow-500 text-black text-xs font-bold px-2 py-1 rounded">HD</div>
                        </div>
                        <div class="p-3">
                            <div class="text-sm font-semibold truncate text-gray-100">${movie.title}</div>
                        </div>
                    `;
                    card.onclick = () => playMovie(movie.url, movie.title, card);
                    grid.appendChild(card);
                });
            } catch (error) {
                console.error("Error loading movies: ", error);
            }
        }

        // Function to Play Selected Movie
        function playMovie(url, title, selectedCard) {
            const container = document.getElementById('player-container');
            const videoElement = document.getElementById('player');
            
            // Remove active border from all cards
            document.querySelectorAll('.movie-card').forEach(c => c.classList.remove('active-card'));
            selectedCard.classList.add('active-card');

            // Show player and set title
            container.classList.remove('hidden');
            document.getElementById('now-playing').innerText = title;
            
            // Set source and play
            videoElement.src = url;
            player.source = {
                type: 'video',
                title: title,
                sources: [{ src: url, type: 'video/mp4' }]
            };
            
            player.play();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Run the loader
        loadMovies();
    </script>

    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
</body>
</html>
