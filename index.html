<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Movie Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        .movie-card:hover img { transform: scale(1.05); transition: 0.3s; }
        .movie-card { overflow: hidden; border-radius: 12px; background: #111; border: 1px solid #222; }
    </style>
</head>
<body class="bg-black text-white font-sans">

    <nav class="bg-gray-900/80 backdrop-blur p-4 sticky top-0 z-50 border-b border-yellow-500/20">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black text-yellow-500 italic">MOVIE<span class="text-white">STORE</span></h1>
        </div>
    </nav>

    <div id="player-section" class="hidden animate-fade-in">
        <div class="bg-black aspect-video w-full max-w-5xl mx-auto border-b border-gray-800">
            <video id="player" playsinline controls crossorigin></video>
        </div>
        <div class="container mx-auto p-4">
            <h2 id="video-title" class="text-xl font-bold text-yellow-500 uppercase tracking-wide"></h2>
            <div class="flex gap-4 mt-4 mb-6">
                <button id="download-btn" class="bg-yellow-600 hover:bg-yellow-500 text-black font-black px-8 py-3 rounded-full flex items-center gap-2 transition">
                    <i class="fas fa-download"></i> DOWNLOAD
                </button>
            </div>
        </div>
    </div>

    <div class="container mx-auto p-4">
        <h3 class="text-sm font-bold text-gray-500 mb-4 uppercase tracking-[0.2em] border-l-4 border-yellow-500 pl-3">Recommended</h3>
        <div id="movie-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
            </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Config Verified from screenshot
        const firebaseConfig = {
            apiKey: "AIzaSyD7T7WZg0fLGTw6ShqDHjOva-btNF6O1AM",
            authDomain: "seafood-oder.firebaseapp.com",
            projectId: "seafood-oder",
            storageBucket: "seafood-oder.firebasestorage.app",
            messagingSenderId: "428949391732",
            appId: "1:428949391732:web:8c0ab80a98d241b865c421"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const player = new Plyr('#player');

        // Link မှားတာကို အလိုအလျောက် ပြင်ပေးမည့် Function
        function fixDriveLink(url) {
            if (url.includes('file/d/')) {
                const id = url.split('/d/')[1].split('/')[0];
                return `https://drive.google.com/uc?export=download&id=${id}`;
            }
            return url;
        }

        async function fetchMovies() {
            const querySnapshot = await getDocs(collection(db, "movies"));
            const grid = document.getElementById('movie-grid');
            grid.innerHTML = '';
            
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                
                // Field နာမည်တွေကို Space ပါပါ၊ မပါပါ အမှန်အတိုင်း ရှာဖတ်ပေးတာပါ
                let movie = { title: "No Title", poster: "", url: "" };
                Object.keys(data).forEach(key => {
                    const k = key.trim().toLowerCase();
                    if (k === "title") movie.title = data[key];
                    if (k === "poster") movie.poster = data[key];
                    if (k === "url") movie.url = fixDriveLink(data[key]); // Link ကို Auto Fix လုပ်မယ်
                });

                const card = document.createElement('div');
                card.className = "movie-card cursor-pointer group";
                card.innerHTML = `
                    <div class="relative aspect-[2/3]">
                        <img src="${movie.poster}" class="w-full h-full object-cover group-hover:opacity-50 transition">
                        <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition">
                            <i class="fas fa-play-circle text-4xl text-yellow-500"></i>
                        </div>
                    </div>
                    <div class="p-3 text-center">
                        <div class="text-[12px] font-bold truncate text-gray-300 uppercase">${movie.title}</div>
                    </div>
                `;
                
                card.onclick = () => {
                    window.scrollTo({top: 0, behavior: 'smooth'});
                    document.getElementById('player-section').classList.remove('hidden');
                    document.getElementById('video-title').innerText = movie.title;
                    document.getElementById('download-btn').onclick = () => window.open(movie.url, '_blank');
                    
                    player.source = {
                        type: 'video',
                        sources: [{ src: movie.url, type: 'video/mp4' }]
                    };
                    player.play();
                };
                grid.appendChild(card);
            });
        }
        fetchMovies();
    </script>
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
</body>
</html>
